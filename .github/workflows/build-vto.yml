name: Build and Push VTO Image

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - requirements.txt
      - handler.py
      - scripts/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 360
    permissions:
      contents: read
      packages: write

    steps:
      - name: Free disk space
        uses: jlumbroso/free-disk-space@54081f138730dfa15788a46383842cd2f914a1be  # main as of 2026-06-15
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          provenance: false
          tags: |
            ghcr.io/danieljenudi/seeksuit-vto:latest
            ghcr.io/danieljenudi/seeksuit-vto:${{ github.sha }}
          cache-from: type=registry,ref=ghcr.io/danieljenudi/seeksuit-vto:buildcache
          cache-to: type=registry,ref=ghcr.io/danieljenudi/seeksuit-vto:buildcache,mode=max
