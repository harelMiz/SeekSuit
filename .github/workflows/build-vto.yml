name: Build and Push VTO Image

on:
  workflow_dispatch:
  push:
    branches: [master]
    paths:
      - Dockerfile
      - requirements.txt
      - handler.py
      - scripts/**

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: jenudi/seeksuit-vto:latest
          cache-from: type=registry,ref=jenudi/seeksuit-vto:buildcache
          cache-to: type=registry,ref=jenudi/seeksuit-vto:buildcache,mode=max
